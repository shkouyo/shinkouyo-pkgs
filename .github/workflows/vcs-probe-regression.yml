name: vcs-probe-regression

on:
  push:
    paths:
      - .github/workflows/_build-package.yml
      - .github/workflows/_check-updates.yml
      - .github/workflows/_remove-package.yml
      - .github/workflows/check-updates.yml
      - .github/workflows/update-regular.yml
      - .github/workflows/update-vcs.yml
      - .github/workflows/vcs-probe-regression.yml
      - packages/**
      - scripts/**
  pull_request:
    paths:
      - .github/workflows/_build-package.yml
      - .github/workflows/_check-updates.yml
      - .github/workflows/_remove-package.yml
      - .github/workflows/check-updates.yml
      - .github/workflows/update-regular.yml
      - .github/workflows/update-vcs.yml
      - .github/workflows/vcs-probe-regression.yml
      - packages/**
      - scripts/**

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    container:
      image: archlinux:multilib-devel
    steps:
      - name: Install probe dependencies
        run: |
          set -eu
          pacman -Sy --noconfirm --needed git shadow

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run VCS probe regression test
        run: |
          set -eu
          sh scripts/ci/run-probe-user.sh sh scripts/test-vcs-probe.sh
