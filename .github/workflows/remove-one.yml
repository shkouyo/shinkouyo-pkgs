name: remove-one

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package name without .sh
        required: true
        type: string
      confirm:
        description: Type DELETE to confirm removal
        required: true
        type: string

concurrency:
  group: ${{ vars.REPO_NAME }}-x86_64
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate input
        run: |
          set -eu
          test "${{ github.event.inputs.confirm }}" = "DELETE"
          test "${{ github.event.inputs.package }}" != "template"

  remove:
    needs: validate
    uses: ./.github/workflows/_remove-package.yml
    with:
      package: ${{ github.event.inputs.package }}
    secrets: inherit
