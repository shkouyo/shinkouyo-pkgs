name: check-updates

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Scan mode
        required: false
        default: all
        type: choice
        options:
          - all
          - regular
          - vcs

jobs:
  run:
    uses: ./.github/workflows/_check-updates.yml
    with:
      mode: ${{ github.event.inputs.mode || 'all' }}
    secrets: inherit
