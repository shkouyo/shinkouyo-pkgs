name: check-updates

on:
  schedule:
    - cron: '0 19,7 * * *'
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: Scan mode
        required: false
        default: all
        type: choice
        options:
          - all
          - regular
          - vcs

concurrency:
  group: ${{ vars.REPO_NAME }}-x86_64
  cancel-in-progress: false

jobs:
  select-mode:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - name: Print revision
        run: |
          set -eu
          printf 'workflow_sha=%s\n' "$GITHUB_SHA"
          printf 'probe_version=%s\n' 'vcs-probe-v3'

      - name: Select mode
        id: mode
        run: |
          set -eu
          mode='all'
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              '0 19,7 * * *') mode='regular' ;;
              '0 2,8,14,20 * * *') mode='vcs' ;;
            esac
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.mode }}" ]; then
            mode='${{ github.event.inputs.mode }}'
          fi
          printf 'mode=%s\n' "$mode" >> "$GITHUB_OUTPUT"

  plan-regular:
    needs: select-mode
    if: needs.select-mode.outputs.mode == 'all' || needs.select-mode.outputs.mode == 'regular'
    runs-on: ubuntu-latest
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
      PACKAGER: ${{ vars.PACKAGER }}
      REPO_NAME: ${{ vars.REPO_NAME }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
      S3_REGION: ${{ vars.S3_REGION }}
      AWS_ENDPOINT_URL_S3: ${{ vars.S3_ENDPOINT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.S3_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.S3_REGION }}
    outputs:
      packages: ${{ steps.queue.outputs.packages }}
    steps:
      - uses: actions/checkout@v6

      - name: Build regular queue
        id: queue
        run: |
          set -eu
          chmod +x scripts/*.sh
          scripts/check-updates.sh regular | LC_ALL=C sort -u > "$RUNNER_TEMP/packages.txt"
          python3 - "$RUNNER_TEMP/packages.txt" <<'PY' >> "$GITHUB_OUTPUT"
          import json, pathlib, sys
          packages = [line.strip() for line in pathlib.Path(sys.argv[1]).read_text().splitlines() if line.strip()]
          print(f"packages={json.dumps(packages)}")
          PY

  plan-vcs:
    needs: select-mode
    if: needs.select-mode.outputs.mode == 'all' || needs.select-mode.outputs.mode == 'vcs'
    runs-on: ubuntu-latest
    container:
      image: archlinux:multilib-devel
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
      PACKAGER: ${{ vars.PACKAGER }}
      REPO_NAME: ${{ vars.REPO_NAME }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
      S3_REGION: ${{ vars.S3_REGION }}
      AWS_ENDPOINT_URL_S3: ${{ vars.S3_ENDPOINT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.S3_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.S3_REGION }}
    outputs:
      packages: ${{ steps.queue.outputs.packages }}
    steps:
      - name: Install planning dependencies
        run: |
          set -eu
          pacman -Sy --noconfirm --needed git aws-cli shadow

      - uses: actions/checkout@v6

      - name: Build VCS queue
        id: queue
        run: |
          set -eu
          chmod +x scripts/*.sh
          probe_user='ci-probe'
          probe_home="$RUNNER_TEMP/$probe_user-home"
          probe_tmp="$RUNNER_TEMP/$probe_user-tmp"
          mkdir -p "$probe_home" "$probe_tmp"
          if ! id "$probe_user" >/dev/null 2>&1; then
            useradd --create-home --home-dir "$probe_home" --shell /bin/sh "$probe_user"
          fi
          chown -R "$probe_user:$probe_user" "$probe_home" "$probe_tmp"
          env HOME="$probe_home" TMPDIR="$probe_tmp" su -m "$probe_user" -s /bin/sh -c '
            set -eu
            cd "$GITHUB_WORKSPACE"
            printf "probe_user=%s uid=%s home=%s tmpdir=%s\n" "$(id -un)" "$(id -u)" "$HOME" "${TMPDIR-}"
            scripts/check-updates.sh vcs
          ' | LC_ALL=C sort -u > "$RUNNER_TEMP/packages.txt"
          python3 - "$RUNNER_TEMP/packages.txt" <<'PY' >> "$GITHUB_OUTPUT"
          import json, pathlib, sys
          packages = [line.strip() for line in pathlib.Path(sys.argv[1]).read_text().splitlines() if line.strip()]
          print(f"packages={json.dumps(packages)}")
          PY

  merge-plan:
    needs:
      - select-mode
      - plan-regular
      - plan-vcs
    if: ${{ always() }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.merge.outputs.matrix }}
      has_items: ${{ steps.merge.outputs.has_items }}
      mode: ${{ needs.select-mode.outputs.mode }}
    steps:
      - name: Merge plan outputs
        id: merge
        env:
          REGULAR_RESULT: ${{ needs.plan-regular.result }}
          REGULAR_PACKAGES: ${{ needs.plan-regular.outputs.packages }}
          VCS_RESULT: ${{ needs.plan-vcs.result }}
          VCS_PACKAGES: ${{ needs.plan-vcs.outputs.packages }}
        run: |
          set -eu
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          def load_packages(result_key: str, packages_key: str) -> list[str]:
              result = os.environ.get(result_key, "")
              if result in {"", "skipped"}:
                  return []
              if result != "success":
                  raise SystemExit(f"{result_key}={result} is not mergeable")
              raw = os.environ.get(packages_key, "")
              if not raw:
                  return []
              data = json.loads(raw)
              if not isinstance(data, list):
                  raise SystemExit(f"{packages_key} is not a JSON array")
              return [str(item) for item in data if str(item).strip()]

          packages = sorted(set(
              load_packages("REGULAR_RESULT", "REGULAR_PACKAGES")
              + load_packages("VCS_RESULT", "VCS_PACKAGES")
          ))
          matrix = {"include": [{"package": package} for package in packages]}
          print(f"matrix={json.dumps(matrix)}")
          print(f"has_items={'true' if packages else 'false'}")
          PY

  build:
    needs: merge-plan
    if: needs.merge-plan.outputs.has_items == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.merge-plan.outputs.matrix) }}
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
      PACKAGER: ${{ vars.PACKAGER }}
      REPO_NAME: ${{ vars.REPO_NAME }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
      S3_REGION: ${{ vars.S3_REGION }}
      AWS_ENDPOINT_URL_S3: ${{ vars.S3_ENDPOINT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.S3_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.S3_REGION }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare build context
        id: prepare
        run: |
          set -eu
          chmod +x scripts/*.sh
          context_dir="$GITHUB_WORKSPACE/.ci-tmp/build-${{ matrix.package }}"
          scripts/build.sh prepare "packages/${{ matrix.package }}.sh" "$context_dir"
          cat "$context_dir/github.env" >> "$GITHUB_ENV"
          . "$context_dir/context.env"
          action_path=$(printf '%s\n' "$BUILD_DIR" | sed "s#^$GITHUB_WORKSPACE/##")
          printf 'context_dir=%s\n' "$context_dir" >> "$GITHUB_OUTPUT"
          printf 'build_dir=%s\n' "$BUILD_DIR" >> "$GITHUB_OUTPUT"
          printf 'action_path=%s\n' "$action_path" >> "$GITHUB_OUTPUT"

      - name: Build package
        uses: heyhusen/archlinux-package-action@v3.0.0
        with:
          path: ${{ steps.prepare.outputs.action_path }}
          flags: -sC --noconfirm
          namcap: false
          srcinfo: false
          aur: true
          archlinux_keyring: false

      - name: Collect artifacts
        run: |
          set -eu
          scripts/build.sh collect "${{ steps.prepare.outputs.context_dir }}"

      - name: Publish artifacts
        run: |
          set -eu
          scripts/publish.sh "${{ steps.prepare.outputs.context_dir }}"

      - name: Cleanup build context
        if: ${{ always() }}
        run: |
          set -eu
          rm -rf "${{ steps.prepare.outputs.context_dir }}"
