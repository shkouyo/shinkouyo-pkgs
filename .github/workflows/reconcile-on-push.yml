name: reconcile-on-push

on:
  push:
    branches:
      - main
    paths:
      - packages/**

concurrency:
  group: ${{ vars.REPO_NAME }}-x86_64
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.plan.outputs.build_matrix }}
      remove_matrix: ${{ steps.plan.outputs.remove_matrix }}
      has_builds: ${{ steps.plan.outputs.has_builds }}
      has_removals: ${{ steps.plan.outputs.has_removals }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Compute package changes
        id: plan
        run: |
          set -eu
          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          diff_file="$RUNNER_TEMP/diff.txt"
          git diff --name-status "$before" "$after" -- 'packages/*.sh' > "$diff_file"
          python3 scripts/ci/package-diff-plan.py "$diff_file" >> "$GITHUB_OUTPUT"

  remove:
    needs: plan
    if: needs.plan.outputs.has_removals == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.plan.outputs.remove_matrix) }}
    uses: ./.github/workflows/_remove-package.yml
    with:
      package: ${{ matrix.package }}
    secrets: inherit

  build:
    needs:
      - plan
      - remove
    if: ${{ always() && needs.plan.outputs.has_builds == 'true' && (needs.plan.outputs.has_removals == 'false' || needs.remove.result == 'success') }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.plan.outputs.build_matrix) }}
    uses: ./.github/workflows/_build-package.yml
    with:
      package: ${{ matrix.package }}
    secrets: inherit
