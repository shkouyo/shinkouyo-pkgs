name: "➕ 新增软件包 / Add Package"
description: "请求新增一个软件包 / Request to add a package"
title: "[新增请求 / Add Request] package-name"
labels:
  - "request:new-pkg"
body:
  - type: markdown
    attributes:
      value: |
        请填写您希望新增的软件包信息
        Please fill in the package information you want to add

  - type: checkboxes
    id: precheck
    attributes:
      label: 提交前确认 / Pre-submission Checklist
      description: |
        请在提交前确认以下内容
        Please confirm the following before submitting
      options:
        - label: 该软件包的 PKGBUILD 符合 AUR 提交准则 / The package PKGBUILD complies with the AUR submission guidelines
          required: true
        - label: 该软件包未被 Arch Linux 官方仓库收录 / The package is not included in the official Arch Linux repositories
          required: true
        - label: 该软件包尚未被请求过 / The package has not already been requested
          required: true
        - label: 该软件包的构建过程不会显著占用构建资源或耗时过长 / The package build process does not consume significant build resources or take too long
          required: false

  - type: input
    id: upstream
    attributes:
      label: 上游地址 / Upstream URL
      description: |
        请提供 AUR 链接, 或包含 PKGBUILD 的上游 Git 仓库地址
        Please provide the AUR link or the upstream Git repository URL containing the PKGBUILD
      placeholder: "https://aur.archlinux.org/pkgbase.git / Upstream repository URL"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 简述 / Summary
      description: |
        请简要说明为什么需要这个软件包, 它适合哪些用户, 以及它相较于其它可选方案的具体优势
        Please briefly explain why this package is needed, who it is suitable for, and its specific advantages over other available options
    validations:
      required: false
