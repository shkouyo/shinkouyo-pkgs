name: "🗑 移除软件包"
description: "请求移除一个已提供的软件包"
title: "[移除请求] package-name"
labels:
  - "request:remove-pkg"
body:
  - type: markdown
    attributes:
      value: |
        请填写您希望移除的软件包信息

  - type: checkboxes
    id: precheck
    attributes:
      label: 提交前确认
      description: 请在提交前确认以下内容
      options:
        - label: 该软件包当前已由本仓库提供
          required: true
        - label: 该请求尚未被提交过，或没有重复议题
          required: true

  - type: input
    id: package_name
    attributes:
      label: 软件包名称
      description: 请填写需要移除的软件包名称
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 移除原因
      description: |
        请明确说明移除原因
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充说明
      description: 如有相关链接, 上游公告, 替代软件包或其它补充信息, 请一并提供
    validations:
      required: false
